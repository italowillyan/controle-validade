<!DOCTYPE html>
<html>
<head>
    <title>Controle de Validade</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        .vencido {
            background-color: #ffcccc;
        }

        .proximo {
            background-color: #fff3cd;
        }

        .valido {
            background-color: #d4edda;
        }
    </style>
</head>
<body>

<h2>Controle de Validade</h2>

<h3>Cadastrar Produto</h3>

<form id="form">
    <input placeholder="Código" id="codigo"><br><br>
    <input placeholder="Produto" id="nome_produto"><br><br>
    <input placeholder="Grupo" id="nome_grupo"><br><br>
    <input placeholder="Local" id="nome_local"><br><br>
    <input type="number" placeholder="Quantidade" id="quantidade"><br><br>
    <input type="date" id="recebimento"><br><br>
    <input type="date" id="validade"><br><br>
    
    <button type="submit">Cadastrar</button>
</form>

<table id="tabela">
    <thead>
        <tr>
            <th>Código</th>
            <th>Produto</th>
            <th>Grupo</th>
            <th>Local</th>
            <th>Quantidade</th>
            <th>Validade</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch("http://127.0.0.1:8000/produtos")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("tbody");

        data.forEach(p => {
            let classe = "";

            if (p.status === "Vencido") classe = "vencido";
            if (p.status === "Proximo") classe = "proximo";
            if (p.status === "Valido") classe = "valido";

            const row = `
                <tr class="${classe}">
                    <td>${p.codigo}</td>
                    <td>${p.nome_produto}</td>
                    <td>${p.nome_grupo}</td>
                    <td>${p.nome_local}</td>
                    <td>${p.quantidade}</td>
                    <td>${p.validade}</td>
                    <td>${p.status}</td>
                </tr>
            `;

            tbody.innerHTML += row;
        });
    });
</script>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const produto = {
        codigo: document.getElementById("codigo").value,
        nome_produto: document.getElementById("nome_produto").value,
        nome_grupo: document.getElementById("nome_grupo").value,
        nome_local: document.getElementById("nome_local").value,
        quantidade: parseInt(document.getElementById("quantidade").value),
        checkado: true,
        recebimento: document.getElementById("recebimento").value,
        validade: document.getElementById("validade").value
    };

    fetch("http://127.0.0.1:8000/produtos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(produto)
    })
    .then(res => res.json())
    .then(data => {
        alert("Produto cadastrado!");
        location.reload();
    });
});
</script>

</body>
</html>
